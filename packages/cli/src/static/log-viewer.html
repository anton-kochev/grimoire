<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
  >
  <title>Grimoire — Agent Insights</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
      --cyan: #39d2c0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }

    .drop-zone p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .drop-zone .big {
      font-size: 16px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .drop-zone input {
      display: none;
    }

    /* Dashboard */
    .dashboard {
      display: none;
    }

    .dashboard.visible {
      display: block;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .stat-card.block .value {
      color: var(--red);
    }

    .stat-card.block {
      border-color: var(--red);
    }

    .stat-card.allow .value {
      color: var(--green);
    }

    .stat-card.muted .value {
      color: var(--text-muted);
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    .filters label {
      font-size: 12px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    select,
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }

    select:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"] {
      width: 240px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* Side panels (ownership + subagents) */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      max-height: 280px;
      overflow-y: auto;
    }

    .own-card {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .own-card:last-child {
      border-bottom: none;
    }

    .own-card .own-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      min-width: 0;
    }

    .own-card .own-header .name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .own-card .count {
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
      margin-left: auto;
    }

    .own-card .patterns {
      margin: 4px 0;
    }

    .pattern-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      margin: 1px 2px 1px 0;
      background: rgba(88, 166, 255, 0.1);
      color: var(--accent);
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
    }

    .muted {
      color: var(--text-muted);
      font-size: 12px;
    }

    .own-card .bar-bg {
      width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 4px;
    }

    .own-card .bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.3s;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--surface);
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover {
      color: var(--text);
    }

    thead th .sort-arrow {
      margin-left: 4px;
      font-size: 10px;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: rgba(88, 166, 255, 0.04);
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    td {
      padding: 8px 12px;
      vertical-align: top;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.green {
      background: rgba(63, 185, 80, 0.15);
      color: var(--green);
    }

    .badge.grey {
      background: rgba(139, 148, 158, 0.15);
      color: var(--text-muted);
    }

    .badge.red {
      background: rgba(248, 81, 73, 0.15);
      color: var(--red);
    }

    .badge.orange {
      background: rgba(210, 153, 34, 0.15);
      color: var(--orange);
    }

    .badge.purple {
      background: rgba(188, 140, 255, 0.15);
      color: var(--purple);
    }

    .badge.cyan {
      background: rgba(57, 210, 192, 0.15);
      color: var(--cyan);
    }

    .cell-clip {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    .cell-clip:hover {
      white-space: normal;
      word-break: break-word;
    }

    .mono {
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }

    .editor-main {
      color: var(--text-muted);
      font-style: italic;
    }

    .session-id {
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    /* Sections layout */
    .section-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 800px) {
      .section-row {
        grid-template-columns: 1fr;
      }
    }

    .sub-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    .sub-item:last-child {
      border-bottom: none;
    }

    .sub-item .name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sub-item .meta {
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Live badge */
    .live-badge {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--green);
      margin-left: 12px;
      vertical-align: middle;
    }

    .live-badge.visible {
      display: inline-flex;
    }

    .live-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .insights-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* Agent roster */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.05s;
    }

    .agent-card:hover {
      border-color: var(--accent);
    }

    .agent-card:active {
      transform: translateY(1px);
    }

    .agent-card .ac-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .agent-card .ac-name {
      font-weight: 700;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attn-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .attn-dot.high { background: var(--red); }
    .attn-dot.warn { background: var(--orange); }
    .attn-dot.ok { background: var(--green); }

    .agent-card .ac-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .ac-metric .m-val {
      font-size: 18px;
      font-weight: 700;
    }

    .ac-metric .m-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .ac-teaser {
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Tool-mix bar */
    .mixbar {
      display: flex;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: var(--border);
      margin: 6px 0;
    }

    .mixbar > span {
      height: 100%;
    }

    .mix-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .mix-legend .swatch {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* Detail view */
    .back-link {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      padding: 0;
      margin-bottom: 12px;
    }

    .rec {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .rec:last-child { border-bottom: none; }

    .rec .lever {
      flex-shrink: 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
    }

    .rec .lever.high { background: rgba(248,81,73,0.15); color: var(--red); }
    .rec .lever.warn { background: rgba(210,153,34,0.15); color: var(--orange); }
    .rec .lever.info { background: rgba(88,166,255,0.12); color: var(--accent); }

    .rec .rec-body .msg { font-size: 13px; }
    .rec .rec-body .ev { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .timeline-step {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 3px 0;
      font-size: 13px;
    }

    .timeline-step .idx {
      color: var(--text-muted);
      font-size: 11px;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    .timeline-step .mono { color: var(--text); }

    .trace-item {
      display: flex;
      gap: 10px;
      align-items: baseline;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .trace-item:last-child { border-bottom: none; }
    .trace-item .tag {
      flex-shrink: 0;
      width: 58px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      padding-top: 1px;
    }
    .trace-item.thought .tag { color: var(--accent); }
    .trace-item.tool .tag { color: var(--orange); }
    .trace-item.tool.err .tag { color: var(--red); }
    .trace-item .body { white-space: pre-wrap; word-break: break-word; }
    .trace-item.thought .body { color: var(--text-muted); font-style: italic; cursor: pointer; }
    .trace-item.tool .body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .trace-item .body.clip {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .trace-item .err-txt {
      display: block;
      margin-top: 3px;
      color: var(--red);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    .kv {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .kv .k { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
    .kv .v { font-size: 20px; font-weight: 700; }

    .md { font-size: 13px; line-height: 1.55; }
    .md code { background: rgba(110,118,129,0.2); padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', SFMono-Regular, Consolas, monospace; }
    .md strong { color: var(--text); }

    #analyzeModel { padding: 5px 8px; }
  </style>
</head>

<body>

  <h1>Grimoire — Agent Insights <span
        class="live-badge"
        id="liveBadge"
    >LIVE</span></h1>

  <div class="tabs">
    <button class="tab active" data-tab="insights">Agent Insights</button>
    <button class="tab" data-tab="events">Events</button>
  </div>

  <!-- ===================== INSIGHTS TAB ===================== -->
  <div id="tab-insights" class="tabpane">
    <div class="insights-toolbar">
      <button class="btn" id="btnRefresh">↻ Refresh</button>
      <span class="muted" id="insightsMeta"></span>
    </div>
    <div id="insightsRoster"></div>
    <div id="insightsDetail" style="display:none"></div>
    <div id="insightsInvocation" style="display:none"></div>
  </div>

  <!-- ===================== EVENTS TAB ===================== -->
  <div
      id="tab-events"
      class="tabpane"
      style="display:none"
  >
  <div
      class="drop-zone"
      id="dropZone"
  >
    <p class="big">Drop <code>grimoire-router.log</code> here</p>
    <p>or click to browse</p>
    <input
        type="file"
        id="fileInput"
        accept=".log,.json,.ndjson"
    >
  </div>

  <div
      class="dashboard"
      id="dashboard"
  >
    <!-- Stats -->
    <div
        class="stats-grid"
        id="statsGrid"
    ></div>

    <!-- Agent ownership + Subagents -->
    <div class="section-row">
      <div>
        <h2>Agent Ownership</h2>
        <div
            class="panel"
            id="ownershipPanel"
        ></div>
      </div>
      <div>
        <h2>Subagents</h2>
        <div
            class="panel"
            id="subagentsPanel"
        ></div>
      </div>
    </div>

    <!-- Filters -->
    <div
        class="filters"
        id="filters"
    >
      <div class="filter-group">
        <label>Event:</label>
        <select id="filterKind">
          <option value="">All</option>
          <option value="enforce">Enforcement</option>
          <option value="subagent">Subagent</option>
          <option value="error">Error</option>
          <option value="legacy">Legacy</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Decision:</label>
        <select id="filterDecision">
          <option value="">All</option>
          <option value="blocked">Blocked</option>
          <option value="allowed">Allowed</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Session:</label>
        <select id="filterSession">
          <option value="">All</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Search:</label>
        <input
            type="text"
            id="filterSearch"
            placeholder="Filter by file, agent, session..."
        >
      </div>
      <button
          class="btn"
          id="btnReset"
      >Reset</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="index"># <span class="sort-arrow"></span></th>
            <th data-sort="timestamp">Time <span class="sort-arrow"></span></th>
            <th data-sort="event">Event <span class="sort-arrow"></span></th>
            <th data-sort="tool">Tool <span class="sort-arrow"></span></th>
            <th data-sort="file">File <span class="sort-arrow"></span></th>
            <th data-sort="editor">Editor <span class="sort-arrow"></span></th>
            <th data-sort="decision">Decision <span class="sort-arrow"></span></th>
            <th data-sort="owners">Owners <span class="sort-arrow"></span></th>
            <th data-sort="session">Session <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
  </div>
  <!-- /tab-events -->

  <script>
    // =========================================================================
    // Agent Insights (primary tab) — profiles + recommendations from /api/insights
    // =========================================================================
    let insightsData = null;
    let insightsLoaded = false;
    let analysisCache = {};

    const TOOL_COLORS = {
      Read: '#58a6ff', Edit: '#3fb950', Write: '#2ea043', MultiEdit: '#238636',
      Bash: '#d29922', Grep: '#bc8cff', Glob: '#a371f7', Agent: '#39d2c0', Task: '#39d2c0',
      WebSearch: '#f778ba', WebFetch: '#db61a2', Skill: '#e3b341', ToolSearch: '#8b949e',
      AskUserQuestion: '#ff7b72',
    };
    function toolColor(name) {
      if (TOOL_COLORS[name]) return TOOL_COLORS[name];
      let h = 0;
      for (const c of String(name)) h = (h * 31 + c.charCodeAt(0)) >>> 0;
      return `hsl(${h % 360} 45% 55%)`;
    }
    function fmtTok(n) {
      n = Math.round(n || 0);
      return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
    }
    function mixbar(toolMix) {
      const es2 = Object.entries(toolMix || {}).sort((a, b) => b[1] - a[1]);
      const total = es2.reduce((s, [, n]) => s + n, 0);
      if (!total) return '<div class="mixbar"></div>';
      return '<div class="mixbar">' + es2.map(([k, n]) =>
        `<span style="width:${(n / total * 100).toFixed(1)}%;background:${toolColor(k)}" title="${esc(k)}: ${n}"></span>`).join('') + '</div>';
    }
    function mixLegend(toolMix) {
      const es2 = Object.entries(toolMix || {}).sort((a, b) => b[1] - a[1]);
      if (!es2.length) return '';
      return '<div class="mix-legend">' + es2.map(([k, n]) =>
        `<span><span class="swatch" style="background:${toolColor(k)}"></span>${esc(k)} ${n}</span>`).join('') + '</div>';
    }
    function agentSeverity(a) {
      if (a.incompleteRate > 0 || a.toolErrorRate > 0) return 'high';
      if (a.avgTurns >= 30) return 'warn';
      return 'ok';
    }

    async function loadInsights(force) {
      const roster = document.getElementById('insightsRoster');
      if (location.protocol === 'file:') {
        roster.innerHTML = '<div class="empty-state">Agent Insights needs the local server — run <code>grimoire logs</code>. (Drag-and-drop only powers the Events tab.)</div>';
        return;
      }
      if (insightsLoaded && !force) { showRoster(); return; }
      roster.innerHTML = '<div class="empty-state">Analyzing sub-agent transcripts…</div>';
      try {

    <div style="display:flex;align-items:center;gap:10px;margin-top:20px">

    <h2 style="margin-top:20px">Invocations <span class="count-badge">${invs.length}</span></h2>

      </tr>`).join('')}</tbody></table></div>`;
    }

    function showInvocation(agentId) {
      const v = insightsData.invocations.find(x => x.agentId === agentId);
      if (!v) return;

    <button class="back-link" onclick="showAgent(currentAgentIndex)">← ${esc(v.agentType)}</button>

      <div><div class="k">Status</div><div class="v" style="font-size:14px">${v.completed ? 'done' : 'incomplete'}${v.toolErrors ? ` · ${v.toolErrors} err` : ''}</div></div>
    </div>
    <h2>Tool mix</h2>
    ${mixbar(v.toolCounts)}${mixLegend(v.toolCounts)}
    <h2 style="margin-top:20px">Trace <span class="muted" style="font-size:12px">thoughts · actions · results</span></h2>
    <div class="panel" id="invTrace"><div class="muted">Loading session trace…</div></div>
    ${v.finalText ? `<h2 style="margin-top:20px">Outcome</h2><div class="panel" style="white-space:pre-wrap;font-size:13px">${esc(v.finalText)}</div>` : ''}`;
      loadInvocationTrace(v);
    }

    // Fetches the full per-run timeline (kept out of /api/insights for weight) and
    // renders it; falls back to the flat tool sequence if the fetch fails.
    async function loadInvocationTrace(v) {
      const panel = document.getElementById('invTrace');
      if (!panel) return;
      try {
        const res = await fetch(`/api/invocations/${encodeURIComponent(v.agentId)}`);
        if (!res.ok) throw new Error('no trace');
        const full = await res.json();
        const items = Array.isArray(full.timeline) ? full.timeline : [];
        if (!items.length) { panel.innerHTML = renderToolSequence(v); return; }
        panel.innerHTML = items.map(renderTraceItem).join('');
      } catch (e) {
        panel.innerHTML = renderToolSequence(v);
      }
    }

    function renderTraceItem(it) {
      if (it.kind === 'tool') {
        const ev = it.event || {};
        const target = ev.target ? `(${esc(ev.target)})` : '';
        const err = ev.isError
          ? `<span class="err-txt">⚠ ${esc(ev.errorText || 'error')}</span>` : '';
        return `<div class="trace-item tool${ev.isError ? ' err' : ''}"><span class="tag">tool</span>`
          + `<span class="body">${esc(ev.name || '?')}${target}${err}</span></div>`;
      }
      const tag = it.kind === 'thinking' ? 'thought' : 'text';
      const cls = it.kind === 'thinking' ? 'thought' : 'text';
      const clip = it.kind === 'thinking' ? ' clip' : '';
      const toggle = it.kind === 'thinking' ? ` onclick="this.classList.toggle('clip')"` : '';
      return `<div class="trace-item ${cls}"><span class="tag">${tag}</span>`
        + `<span class="body${clip}"${toggle}>${esc(it.text || '')}</span></div>`;
    }

    function renderToolSequence(v) {
      return v.toolSequence && v.toolSequence.length
        ? v.toolSequence.map((t, i) => `<div class="timeline-step"><span class="idx">${i + 1}</span><span class="mono">${esc(t)}</span></div>`).join('')
        : '<div class="muted">No tool calls recorded.</div>';
    }

    // --- LLM analysis (on demand) ---
    async function runAnalysis(agentType) {
      const panel = document.getElementById('analysisPanel');
      const btn = document.getElementById('btnAnalyze');
      const model = (document.getElementById('analyzeModel') || {}).value || 'haiku';
      panel.innerHTML = `<div class="muted">Analyzing with Claude (${esc(model)})… reading the agent definition and real run traces — this can take ~10–40s.</div>`;
      if (btn) btn.disabled = true;
      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentType, model }),
        });
        const data = await res.json();
        analysisCache[agentType] = data;
        panel.innerHTML = renderAnalysis(data);
      } catch (e) {
        panel.innerHTML = `<div class="muted">Analysis request failed: ${esc(String(e))}</div>`;
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    function renderAnalysis(data) {
      if (!data || !data.ok) {
        return `<div class="muted">Analysis failed: ${esc((data && data.error) || 'unknown error')}</div>`;
      }
      const bits = [`${data.runsAnalyzed || 0} runs`, `model ${esc(data.model || '?')}`];
      if (data.costUsd != null) bits.push(`$${data.costUsd.toFixed(4)}`);
      if (data.durationMs != null) bits.push(`${(data.durationMs / 1000).toFixed(1)}s`);
      const footer = `<div class="muted" style="font-size:11px;border-top:1px solid var(--border);margin-top:12px;padding-top:8px">${bits.join(' · ')}</div>`;
      return `<div class="md">${mdToHtml(data.result || '')}</div>${footer}`;
    }

    // Minimal, safe markdown → HTML (escape first, then structure).
    function mdToHtml(md) {
      const inline = s => s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`([^`]+)`/g, '<code>$1</code>');
      let html = '', inList = false;
      for (const raw of esc(md).split('\n')) {
        const line = raw.trimEnd();
        let m;
        if ((m = line.match(/^#{1,6}\s+(.*)$/))) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<h3 style="font-size:14px;margin:12px 0 4px">${inline(m[1])}</h3>`;
        } else if ((m = line.match(/^\s*[-*]\s+(.*)$/))) {
          if (!inList) { html += '<ul style="margin:4px 0 4px 18px">'; inList = true; }
          html += `<li style="margin:3px 0">${inline(m[1])}</li>`;
        } else if (!line.trim()) {
          if (inList) { html += '</ul>'; inList = false; }
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p style="margin:6px 0">${inline(line)}</p>`;
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        const tab = t.dataset.tab;
        document.getElementById('tab-insights').style.display = tab === 'insights' ? 'block' : 'none';
        document.getElementById('tab-events').style.display = tab === 'events' ? 'block' : 'none';
        if (tab === 'events') autoFetch();
        if (tab === 'insights') loadInsights(false);
      });
    });
    document.getElementById('btnRefresh').addEventListener('click', () => loadInsights(true));

    // =========================================================================
    // Events (secondary tab) — enforcement audit
    // =========================================================================
    let entries = [];
    let sortCol = 'timestamp';
    let sortAsc = false;

    // --- Classify a log entry into a kind ---
    // The router emits: enforcement decisions (PreToolUse), subagent lifecycle
    // telemetry (SubagentStart/Stop) and error entries. Anything else (old
    // skill-routing logs) degrades to 'legacy'.
    function classify(e) {
      if (e.hook_event === 'SubagentStart' || e.hook_event === 'SubagentStop') return 'subagent';
      if (e.error_type || e.level === 'error') return 'error';
      if (e.enforce_block === true) return 'enforce-blocked';
      if (e.owner_bypass === true) return 'enforce-allow-owner';
      if (e.hook_event === 'PreToolUse' && e.outcome === 'allow') return 'enforce-allow';
      return 'legacy';
    }

    function isEnforce(kind) { return kind.startsWith('enforce'); }

    function fileOf(e) {
      if (e.file_basename) return e.file_basename;
      if (typeof e.file_path === 'string') return e.file_path.split('/').pop();
      if (e.relative_path) return e.relative_path;
      return '';
    }

    function editorOf(e, kind) {
      if (e.agent_type) return e.agent_type;
      if (isEnforce(kind)) return 'main thread';
      return '';
    }

    function ownersOf(e, kind) {
      if (kind === 'enforce-blocked') return (e.blocking_agents ?? []).join(', ');
      if (kind === 'enforce-allow-owner') return e.agent_type ?? '';
      return '';
    }

    function reasonBadgeClass(reason) {
      return reason === 'success' ? 'green' : reason === 'error' ? 'red' : 'orange';
    }

    // --- Append new log entries without clearing existing ones ---
    function appendLog(text) {
      let added = 0;

      for (const line of text.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        try {
          const obj = JSON.parse(trimmed);
          obj._index = entries.length;
          obj._kind = classify(obj);
          entries.push(obj);
          added++;
        } catch { /* skip malformed */ }
      }

      if (added === 0) return;

      dropZone.style.display = 'none';
      document.getElementById('dashboard').classList.add('visible');
      buildDashboard();
      populateFilters();
      renderTable();
    }

    // --- Load agent ownership from the manifest (router.agents) ---
    let ownershipAgents = {};

    async function loadOwnership() {
      try {
        const res = await fetch('/api/manifest');
        if (!res.ok) return;
        const manifest = await res.json();
        ownershipAgents = (manifest.router && manifest.router.agents) ? manifest.router.agents : {};
        renderOwnership();
      } catch { /* manifest not available in file: mode */ }
    }

    function renderOwnership() {
      const panel = document.getElementById('ownershipPanel');
      const names = Object.keys(ownershipAgents);
      if (!names.length) {
        panel.innerHTML = '<div class="empty-state">No agent ownership configured</div>';
        return;
      }

      const stats = {};
      for (const n of names) stats[n] = { blocked: 0, allowed: 0 };
      for (const e of entries) {
        if (e._kind === 'enforce-blocked') {
          for (const a of (e.blocking_agents ?? [])) if (stats[a]) stats[a].blocked++;
        } else if (e._kind === 'enforce-allow-owner' && e.agent_type && stats[e.agent_type]) {
          stats[e.agent_type].allowed++;
        }
      }

      const max = Math.max(1, ...names.map(n => stats[n].blocked));
      const sorted = [...names].sort((a, b) => stats[b].blocked - stats[a].blocked);

      panel.innerHTML = sorted.map(n => {
        const patterns = ownershipAgents[n].file_patterns ?? [];
        const pct = (stats[n].blocked / max * 100).toFixed(0);
        const patternsHtml = patterns.length
          ? patterns.map(p => `<span class="pattern-tag">${esc(p)}</span>`).join('')
          : '<span class="muted">no patterns — not enforced</span>';
        return `<div class="own-card">
      <div class="own-header">
        <span class="name">${esc(n)}</span>
        <span class="count">${stats[n].blocked} blocked · ${stats[n].allowed} allowed</span>
      </div>
      <div class="patterns">${patternsHtml}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:var(--red)"></div></div>
    </div>`;
      }).join('');
    }

    // --- Subagent lifecycle: pair Start/Stop by agent_id ---
    function renderSubagents() {
      const panel = document.getElementById('subagentsPanel');
      const subs = entries.filter(e => e._kind === 'subagent');
      if (!subs.length) {
        panel.innerHTML = '<div class="empty-state">No subagent activity</div>';
        return;
      }

      const map = {};
      for (const e of subs) {
        const id = e.agent_id ?? ('session:' + (e.session_id ?? 'unknown'));
        if (!map[id]) map[id] = { id, type: e.agent_type ?? 'unknown', start: null, stop: null, reason: null };
        if (e.hook_event === 'SubagentStart') map[id].start = e.timestamp;
        if (e.hook_event === 'SubagentStop') { map[id].stop = e.timestamp; map[id].reason = e.stop_reason ?? null; }
      }

      const list = Object.values(map).sort((a, b) => {
        const ka = a.start ?? a.stop ?? '';
        const kb = b.start ?? b.stop ?? '';
        return kb < ka ? -1 : kb > ka ? 1 : 0;
      });

      panel.innerHTML = list.map(s => {
        let dur = '<span class="badge cyan">running</span>';
        if (s.start && s.stop) {
          const d = new Date(s.stop) - new Date(s.start);
          dur = `<span class="muted">${d >= 0 ? fmtDur(d) : '—'}</span>`;
        } else if (!s.start && s.stop) {
          dur = '<span class="muted">—</span>';
        }
        const reason = s.reason ? `<span class="badge ${reasonBadgeClass(s.reason)}">${esc(s.reason)}</span>` : '';
        return `<div class="sub-item">
      <span class="name" title="${esc(s.id)}">${esc(s.type)}</span>
      <span class="meta">${dur} ${reason}</span>
    </div>`;
      }).join('');
    }

    function fmtDur(ms) {
      if (ms < 1000) return ms + 'ms';
      const s = ms / 1000;
      if (s < 60) return s.toFixed(1) + 's';
      const m = Math.floor(s / 60);
      return m + 'm ' + Math.round(s % 60) + 's';
    }

    // --- Auto-fetch from API when served via HTTP (lazy: only when Events tab opens) ---
    let eventsInited = false;
    function autoFetch() {
      if (eventsInited) return;
      eventsInited = true;
      if (location.protocol === 'file:') return;

      loadOwnership();

      const es = new EventSource('/api/logs/stream');

      es.onmessage = (e) => {
        if (e.data.trim()) appendLog(e.data);
        document.getElementById('liveBadge').classList.add('visible');
      };

      es.addEventListener('reset', () => {
        entries = [];
      });

      es.onerror = async () => {
        es.close();
        document.getElementById('liveBadge').classList.remove('visible');
        // Fall back to one-shot fetch
        try {
          const res = await fetch('/api/logs');
          if (!res.ok) return;
          const text = await res.text();
          if (text.trim()) parseLog(text);
        } catch { /* fall back to drag-and-drop */ }
      };
    }

    // --- File loading ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const text = e.target.result;
        parseLog(text);
      };
      reader.readAsText(file);
    }

    function parseLog(text) {
      entries = [];

      for (const line of text.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        try {
          const obj = JSON.parse(trimmed);
          obj._index = entries.length;
          obj._kind = classify(obj);
          entries.push(obj);
        } catch { /* skip malformed */ }
      }

      if (entries.length === 0) {
        alert('No valid log entries found in this file.');
        return;
      }

      dropZone.style.display = 'none';
      document.getElementById('dashboard').classList.add('visible');
      buildDashboard();
      populateFilters();
      renderTable();
    }

    // --- Dashboard ---
    function buildDashboard() {
      const total = entries.length;
      const decisions = entries.filter(e => isEnforce(e._kind)).length;
      const blocks = entries.filter(e => e._kind === 'enforce-blocked').length;
      const ownerAllows = entries.filter(e => e._kind === 'enforce-allow-owner').length;
      const unownedAllows = entries.filter(e => e._kind === 'enforce-allow').length;
      const spawns = entries.filter(e => e.hook_event === 'SubagentStart').length;
      const errors = entries.filter(e => e._kind === 'error').length;
      const sessions = new Set(entries.map(e => e.session_id)).size;
      const blockRate = decisions ? (blocks / decisions * 100).toFixed(0) : '0';

      document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="value">${total}</div><div class="label">Total Events</div></div>
    <div class="stat-card"><div class="value">${decisions}</div><div class="label">Enforce Decisions</div></div>
    <div class="stat-card block"><div class="value">${blocks}</div><div class="label">Blocks (${blockRate}%)</div></div>
    <div class="stat-card allow"><div class="value">${ownerAllows}</div><div class="label">Owner Allows</div></div>
    <div class="stat-card muted"><div class="value">${unownedAllows}</div><div class="label">Unowned Allows</div></div>
    <div class="stat-card"><div class="value">${spawns}</div><div class="label">Subagent Spawns</div></div>
    <div class="stat-card ${errors ? 'block' : ''}"><div class="value">${errors}</div><div class="label">Errors</div></div>
    <div class="stat-card"><div class="value">${sessions}</div><div class="label">Sessions</div></div>
  `;

      renderOwnership();
      renderSubagents();
    }

    // --- Filters ---
    function populateFilters() {
      const sessionSelect = document.getElementById('filterSession');
      const current = sessionSelect.value;
      const sessions = [...new Set(entries.map(e => e.session_id ?? 'unknown'))];
      sessionSelect.innerHTML = '<option value="">All</option>' +
        sessions.map(s => `<option value="${esc(s)}">${String(s).length > 20 ? String(s).slice(0, 8) + '...' + String(s).slice(-4) : esc(s)}</option>`).join('');
      sessionSelect.value = current;
    }

    document.getElementById('filterKind').addEventListener('change', renderTable);
    document.getElementById('filterDecision').addEventListener('change', renderTable);
    document.getElementById('filterSession').addEventListener('change', renderTable);
    document.getElementById('filterSearch').addEventListener('input', renderTable);
    document.getElementById('btnReset').addEventListener('click', () => {
      document.getElementById('filterKind').value = '';
      document.getElementById('filterDecision').value = '';
      document.getElementById('filterSession').value = '';
      document.getElementById('filterSearch').value = '';
      renderTable();
    });

    // --- Sorting ---
    document.querySelectorAll('thead th[data-sort]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortAsc = !sortAsc;
        else { sortCol = col; sortAsc = true; }
        renderTable();
      });
    });

    function getSortValue(entry, col) {
      switch (col) {
        case 'index': return entry._index;
        case 'timestamp': return entry.timestamp ?? '';
        case 'event': return entry._kind ?? '';
        case 'tool': return entry.tool_name ?? '';
        case 'file': return fileOf(entry);
        case 'editor': return editorOf(entry, entry._kind);
        case 'decision': return entry._kind ?? '';
        case 'owners': return ownersOf(entry, entry._kind);
        case 'session': return entry.session_id ?? '';
        default: return 0;
      }
    }

    // --- Render ---
    function eventBadge(e, kind) {
      if (kind === 'subagent') {
        return `<span class="badge purple">${esc(e.hook_event)}</span>`;
      }
      if (kind === 'error') return `<span class="badge red">Error</span>`;
      if (kind === 'legacy') return `<span class="badge grey">Legacy</span>`;
      return `<span class="badge cyan">PreToolUse</span>`;
    }

    function decisionCell(e, kind) {
      if (kind === 'enforce-blocked') return `<span class="badge red">Blocked</span>`;
      if (kind === 'enforce-allow-owner') return `<span class="badge green">Allowed · owner</span>`;
      if (kind === 'enforce-allow') return `<span class="badge grey">Allowed</span>`;
      if (kind === 'subagent') {
        if (e.hook_event === 'SubagentStop') {
          const r = e.stop_reason ?? 'stopped';
          return `<span class="badge ${reasonBadgeClass(e.stop_reason)}">${esc(r)}</span>`;
        }
        return '<span class="badge cyan">started</span>';
      }
      if (kind === 'error') return `<span class="badge red">${esc(e.error_type ?? 'error')}</span>`;
      return '<span class="muted">—</span>';
    }

    function renderTable() {
      const kind = document.getElementById('filterKind').value;
      const decision = document.getElementById('filterDecision').value;
      const session = document.getElementById('filterSession').value;
      const search = document.getElementById('filterSearch').value.toLowerCase();

      let filtered = entries.filter(e => {
        const group = isEnforce(e._kind) ? 'enforce' : e._kind;
        if (kind && group !== kind) return false;
        if (decision === 'blocked' && e._kind !== 'enforce-blocked') return false;
        if (decision === 'allowed' && !(e._kind === 'enforce-allow-owner' || e._kind === 'enforce-allow')) return false;
        if (session && (e.session_id ?? 'unknown') !== session) return false;
        if (search) {
          const haystack = [
            fileOf(e),
            e.agent_type ?? '',
            ...(e.blocking_agents ?? []),
            e.tool_name ?? '',
            e.session_id ?? '',
            e.stop_reason ?? '',
            e.message ?? '',
            e.hook_event ?? '',
          ].join(' ').toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });

      // Sort
      filtered.sort((a, b) => {
        const va = getSortValue(a, sortCol);
        const vb = getSortValue(b, sortCol);
        const cmp = va < vb ? -1 : va > vb ? 1 : 0;
        return sortAsc ? cmp : -cmp;
      });

      // Update sort arrows
      document.querySelectorAll('thead th[data-sort]').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (th.dataset.sort === sortCol) arrow.textContent = sortAsc ? '▲' : '▼';
        else arrow.textContent = '';
      });

      const tbody = document.getElementById('tableBody');
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No entries match filters</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(e => {
        const kind = e._kind;
        const ts = formatTime(e.timestamp);
        const tool = e.tool_name ? `<span class="mono">${esc(e.tool_name)}</span>` : '<span class="muted">—</span>';
        const file = fileOf(e);
        const fileCell = file ? `<div class="cell-clip mono" title="${esc(e.file_path ?? file)}">${esc(file)}</div>` : '<span class="muted">—</span>';
        const editor = editorOf(e, kind);
        const editorCell = editor
          ? (editor === 'main thread' ? '<span class="editor-main">main thread</span>' : `<span class="mono">${esc(editor)}</span>`)
          : '<span class="muted">—</span>';
        const owners = ownersOf(e, kind);
        const ownersCell = owners ? `<div class="cell-clip mono" title="${esc(owners)}">${esc(owners)}</div>` : '<span class="muted">—</span>';
        const sid = e.session_id ?? '';
        const sidCell = sid ? `<span class="session-id" title="${esc(sid)}">${String(sid).length > 12 ? String(sid).slice(0, 8) + '…' : esc(sid)}</span>` : '<span class="muted">—</span>';

        return `<tr>
      <td style="color:var(--text-muted);font-size:12px">${e._index + 1}</td>
      <td style="white-space:nowrap;font-size:12px" title="${esc(e.timestamp)}">${ts}</td>
      <td>${eventBadge(e, kind)}</td>
      <td>${tool}</td>
      <td>${fileCell}</td>
      <td>${editorCell}</td>
      <td>${decisionCell(e, kind)}</td>
      <td>${ownersCell}</td>
      <td>${sidCell}</td>
    </tr>`;
      }).join('');
    }

    function formatTime(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
          d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      } catch { return ts; }
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    // Insights is the default tab — load it on open.
    loadInsights(false);
  </script>
</body>

</html>
